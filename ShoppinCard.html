<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion Panier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">
  <h2 class="text-center mb-4">Gestion Panier</h2>

  <div class="row">
    <!-- Produits -->
    <div class="col-md-5">
      <label class="form-label">Produits</label>
      <select id="selectProduits" class="form-select" multiple size="10"></select>
    </div>

    <!-- Boutons -->
    <div class="col-md-2 d-flex flex-column justify-content-center align-items-center gap-3">
      <button id="btnAjouter" class="btn btn-primary w-100">>></button>
      <button id="btnSupprimer" class="btn btn-danger w-100"><<</button>
    </div>

    <!-- Panier -->
    <div class="col-md-5">
      <label class="form-label">Panier</label>
      <select id="selectPanier" class="form-select" multiple size="10"></select>
      <h5 class="mt-3 text-end">Total : <span id="total">0</span> DH</h5>
    </div>
  </div>
</div>

<script>

// 1. Données

const produits = [
  { ref: 1, nom: "PC", prix: 8000 },
  { ref: 2, nom: "Souris", prix: 150 },
  { ref: 3, nom: "Clavier", prix: 300 },
  { ref: 4, nom: "Ecran", prix: 2000 }
];

let panier = [];


//  Charger Produits

function chargerProduits() {
  const select = document.querySelector("#selectProduits");
  select.innerHTML = "";

  produits.forEach(p => {
    const option = document.createElement("option");
    option.value = p.ref;
    option.textContent = `${p.nom} - ${p.prix} DH`;
    select.appendChild(option);
  });
}


//  Afficher Panier

function afficherPanier() {
  const select = document.querySelector("#selectPanier");
  select.innerHTML = "";

  panier.forEach(p => {
    const option = document.createElement("option");
    option.value = p.ref;
    option.textContent = `${p.nom} | ${p.prix} DH | QTE: ${p.qte}`;
    select.appendChild(option);
  });
}


//  Filtrer Panier

function filtrerPanier() {
  panier = panier.filter(p => p.qte > 0);
}


//  Calcul Total

function calculerTotal() {
  let total = 0;
  panier.forEach(p => {
    total += p.prix * p.qte;
  });
  document.querySelector("#total").textContent = total;
}





//  Ajouter au panier

document.querySelector("#btnAjouter").addEventListener("click", () => {
  const select = document.querySelector("#selectProduits");
  const selected = Array.from(select.selectedOptions);

  selected.forEach(opt => {
    const ref = parseInt(opt.value);
    const produit = produits.find(p => p.ref === ref);
    const inPanier = panier.find(p => p.ref === ref);

    if (inPanier) {
      inPanier.qte++;
    } else {
      panier.push({ ...produit, qte: 1 });
    }
  });

  miseAJour();
});


//  Supprimer du panier

document.querySelector("#btnSupprimer").addEventListener("click", () => {
  const select = document.querySelector("#selectPanier");
  const selected = Array.from(select.selectedOptions).map(opt => parseInt(opt.value));

  panier = panier.filter(p => !selected.includes(p.ref));

  miseAJour();
});


//  Modifier Quantité

document.querySelector("#selectPanier").addEventListener("click", (e) => {
  if (e.target.tagName === "OPTION") {
    const ref = parseInt(e.target.value);
    const produit = panier.find(p => p.ref === ref);

    let nouvelleQte = prompt("Nouvelle quantité :", produit.qte);

    if (nouvelleQte !== null) {
      produit.qte = parseInt(nouvelleQte) || 0;
      miseAJour();
    }
  }
});



// Mise à jour globale

function miseAJour() {
  filtrerPanier();
  afficherPanier();
  calculerTotal();
}

chargerProduits();
</script>

</body>
</html>
